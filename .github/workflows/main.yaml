name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      buildVersion: "4.0"
      projectToPublish: "**/*.csproj"
      zipArtifact: true
      runTests: false
      nugetFeedUrl: "https://api.nuget.org/v3/index.json"

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.x.x'

    - name: Restore Packages
      run: dotnet restore

    - name: Build Projects
      run: dotnet build --configuration Release /p:BUILD_BUILDNUMBER=${{ env.buildVersion }}.${{ github.run_number }}

    - name: Run Unit Tests
      if: ${{ env.runTests }}
      run: dotnet test --configuration Release /p:BUILD_BUILDNUMBER=${{ env.buildVersion }}.${{ github.run_number }} --logger trx --collect "Code coverage"

    - name: Publish Test Results
      if: ${{ env.runTests }}
      uses: dorny/test-reporter@v3
      with:
        name: Test Results
        path: '**/*.trx'
        reporter: dotnet-trx
      continue-on-error: true

    - name: Generate Coverage Report
      if: ${{ env.runTests }}
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
      with:
        reports: '**/TestResults/*/coverage.cobertura.xml'
        targetdir: 'coverage-report'
        reporttypes: 'HtmlInline;Cobertura'
      continue-on-error: true

    - name: Upload Coverage Report
      if: ${{ env.runTests }}
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage-report

    - name: Publish NuGet Package
      run: |
        Get-ChildItem -Path . -Recurse -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "$env:NUGET_FEED_URL" --api-key "$env:NUGET_API_KEY"
        }
        Get-ChildItem -Path . -Recurse -Filter *.snupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "$env:NUGET_FEED_URL" --api-key "$env:NUGET_API_KEY"
        }
      shell: pwsh
      env:
        NUGET_FEED_URL: ${{ env.nugetFeedUrl }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Publish Build
      if: ${{ env.projectToPublish != '' }}
      run: dotnet publish "${{ env.projectToPublish }}" /p:BUILD_BUILDNUMBER=${{ env.buildVersion }}.${{ github.run_number }} --configuration Release --output ./publish/

    - name: Archive Build
      if: ${{ env.zipArtifact && env.projectToPublish != '' }}
      uses: actions/upload-artifact@v7
      with:
        name: build-zip
        path: ./publish/

    - name: Stage Build (Unzipped)
      if: ${{ !env.zipArtifact && env.projectToPublish != '' }}
      uses: actions/upload-artifact@v7
      with:
        name: build-folder
        path: ./publish/